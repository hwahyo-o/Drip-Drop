name: Deploy Drip Drop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Firebase runtime config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const readSecret = (name) => process.env[name] || process.env[`VITE_${name}`] || "";
          const config = {
            apiKey: readSecret("FIREBASE_API_KEY"),
            authDomain: readSecret("FIREBASE_AUTH_DOMAIN"),
            projectId: readSecret("FIREBASE_PROJECT_ID"),
            storageBucket: readSecret("FIREBASE_STORAGE_BUCKET"),
            messagingSenderId: readSecret("FIREBASE_MESSAGING_SENDER_ID"),
            appId: readSecret("FIREBASE_APP_ID"),
            measurementId: readSecret("FIREBASE_MEASUREMENT_ID")
          };
          const required = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId"];
          const missing = required.filter((key) => !config[key]);
          if (missing.length) {
            console.warn(`Missing GitHub Actions secrets for Firebase config: ${missing.join(", ")}. Deploying public map UI without Firebase login.`);
            config.apiKey = "";
            config.authDomain = "";
            config.projectId = "";
            config.storageBucket = "";
            config.messagingSenderId = "";
            config.appId = "";
            config.measurementId = "";
          }
          const output = `export const firebaseConfig = ${JSON.stringify(config, null, 2)};\n\nexport function hasFirebaseConfig() {\n  return Boolean(firebaseConfig.apiKey && firebaseConfig.authDomain && firebaseConfig.projectId && firebaseConfig.appId);\n}\n`;
          fs.writeFileSync("js/firebaseConfig.js", output);
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4