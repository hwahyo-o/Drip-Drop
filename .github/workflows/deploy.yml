name: Deploy Drip Drop

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Firebase runtime config
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const config = {
            apiKey: process.env.VITE_FIREBASE_API_KEY || "",
            authDomain: process.env.VITE_FIREBASE_AUTH_DOMAIN || "",
            projectId: process.env.VITE_FIREBASE_PROJECT_ID || "",
            storageBucket: process.env.VITE_FIREBASE_STORAGE_BUCKET || "",
            messagingSenderId: process.env.VITE_FIREBASE_MESSAGING_SENDER_ID || "",
            appId: process.env.VITE_FIREBASE_APP_ID || "",
            measurementId: process.env.VITE_FIREBASE_MEASUREMENT_ID || ""
          };
          const required = ["apiKey", "authDomain", "projectId", "storageBucket", "messagingSenderId", "appId"];
          const missing = required.filter((key) => !config[key]);
          if (missing.length) {
            console.warn(`Missing GitHub Actions secrets for Firebase config: ${missing.join(", ")}. Deploying public map UI without Firebase login.`);
            config.apiKey = "";
            config.authDomain = "";
            config.projectId = "";
            config.storageBucket = "";
            config.messagingSenderId = "";
            config.appId = "";
            config.measurementId = "";
          }
          const output = `export const firebaseConfig = ${JSON.stringify(config, null, 2)};\n\nexport function hasFirebaseConfig() {\n  return Boolean(firebaseConfig.apiKey && firebaseConfig.authDomain && firebaseConfig.projectId && firebaseConfig.appId);\n}\n`;
          fs.writeFileSync("js/firebaseConfig.js", output);
          NODE

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4