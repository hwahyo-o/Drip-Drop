<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Drip Drop | 로스터리 카페 지도</title>
    <meta name="description" content="현재 위치 주변의 로스터리 카페를 지도와 리스트로 탐색하세요.">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/admin.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#map" aria-label="Drip Drop 홈">
          <span class="brand-mark">DD</span>
          <span><strong>Drip Drop</strong><small>로스터리 카페 지도</small></span>
        </a>
        <form id="searchForm" class="search" role="search">
          <label class="sr-only" for="searchInput">카페명, 주소, 메뉴 검색</label>
          <input id="searchInput" type="search" placeholder="카페명, 주소, 필터 커피, 원두 검색">
          <button type="submit">검색</button>
        </form>
        <nav class="nav-actions" aria-label="주요 메뉴">
          <button class="icon-button" id="locateButton" type="button" title="현재 위치">⌖</button>
          <button class="text-button" id="loginButton" type="button">Google 로그인</button>
          <button class="text-button hidden" id="logoutButton" type="button">로그아웃</button>
        </nav>
      </header>
      <main class="workspace">
        <aside class="sidebar" aria-label="검색과 목록">
          <section class="panel filter-panel">
            <div class="section-heading"><h1>로스터리 찾기</h1><div class="segmented" role="tablist" aria-label="보기 방식"><button id="mapViewButton" class="active" type="button">지도</button><button id="listViewButton" type="button">리스트</button></div></div>
            <div class="filters" aria-label="필터"><label><input type="checkbox" value="beans" data-filter> 원두 구매</label><label><input type="checkbox" value="filter" data-filter> 필터 커피</label><label><input type="checkbox" value="open" data-filter> 영업 중</label><label><input type="checkbox" value="parking" data-filter> 주차</label><label><input type="checkbox" value="wifi" data-filter> Wi-Fi</label></div>
          </section>
          <section class="panel account-panel" id="accountPanel"><h2>내 취향</h2><div id="signedOutState" class="muted">로그인하면 찜, 취향 프로필, 추천을 사용할 수 있습니다.</div><div id="signedInState" class="hidden"><p id="userSummary"></p><div class="profile-grid"><label>선호 향미 <input id="tasteInput" placeholder="예: 꽃향, 베리, 고소함"></label><label>보유 원두 <input id="ownedBeansInput" placeholder="예: 에티오피아 내추럴"></label><label>갖고 싶은 원두 <input id="wantedBeansInput" placeholder="예: 파나마 게이샤"></label></div><button class="wide-button" id="saveProfileButton" type="button">프로필 저장</button></div></section>
          <section class="panel"><div class="section-heading"><h2>추천</h2><button id="refreshRecommendationsButton" type="button">갱신</button></div><div id="recommendationsList" class="compact-list"></div></section>
          <section class="panel list-panel"><div class="section-heading"><h2>카페 목록</h2><span id="resultCount" class="badge">0</span></div><div id="cafeList" class="cafe-list"></div></section>
        </aside>
        <section class="map-stage" aria-label="지도"><div id="map"></div><article id="detailPanel" class="detail-panel" aria-live="polite"></article></section>
        <section id="listStage" class="list-stage hidden" aria-label="리스트 보기"><div id="wideCafeList" class="wide-list"></div></section>
      </main>
      <section class="drawer" id="communityDrawer" aria-label="커뮤니티와 알림"><div class="drawer-tabs"><button data-drawer-tab="favorites" class="active" type="button">찜</button><button data-drawer-tab="community" type="button">커뮤니티</button><button data-drawer-tab="reviews" type="button">내 리뷰</button><button data-drawer-tab="alerts" type="button">알림</button><button data-drawer-tab="report" type="button">연간 리포트</button><button data-drawer-tab="admin" id="adminTabButton" class="hidden" type="button">관리자</button></div><div id="drawerContent" class="drawer-content"></div></section>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
